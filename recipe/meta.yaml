{% set name = "nccl4py" %}
{% set version = "0.3.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  # NVIDIA tags nccl4py releases separately as `nccl4py-vX.Y.Z` on the
  # NVIDIA/nccl repository; the tarball extracts to `nccl-nccl4py-vX.Y.Z/`
  # with the Python package at `nccl4py/` in that root.
  url: https://github.com/NVIDIA/nccl/archive/refs/tags/nccl4py-v{{ version }}.tar.gz
  sha256: 71112c0730d221a4a93fd91714e3d6bfb5beaa8d24c7904b1437caab8ef141e7

build:
  number: 0
  skip: true  # [not linux]
  ignore_run_exports:
    # nccl4py is CUDA-major-agnostic: its compiled extensions use only opaque
    # CUDA handle types (cudaStream_t, etc. from driver_types.h) and do not
    # link libcudart. NCCL is dlopen'd at runtime via cuda-pathfinder, so a
    # single build can serve either a CUDA 12 or CUDA 13 environment. Drop the
    # normal run_exports that would otherwise pin cuda-version to the build's
    # CUDA major (analogous to CUDA Enhanced Compatibility).
    - cuda-version
  ignore_run_exports_from:
    - cuda-cudart-dev

requirements:
  build:
    - {{ stdlib("c") }}
    - {{ compiler("c") }}
    - {{ compiler("cxx") }}
    - {{ compiler("cuda") }}
    - arm-variant * {{ arm_variant_type }}  # [aarch64]
  host:
    - python
    - pip
    - setuptools >=77.0.3
    - cython >=0.29.24
    - cuda-version {{ cuda_compiler_version }}.*
    - cuda-cudart-dev
  run:
    - python
    - numpy
    - packaging
    - cuda-core >=0.5.0,<1
    - cuda-pathfinder >=1.1,<2
    - cuda-bindings
    - cuda-version >=12,<14.0a0
    # nccl_linux.pyx was automatically generated against NCCL 2.30.0
    # See: bindings/nccl4py/nccl/bindings/_internal/nccl_linux.pyx
    - nccl >=2.30,<3

test:
  imports:
    - nccl
    - nccl.bindings
    - nccl.core
  requires:
    - pip
  commands:
    - pip check
    - python -c "import nccl, nccl.bindings, nccl.core; print(nccl.__version__)"

about:
  home: https://developer.nvidia.com/nccl
  license: BSD-3-Clause
  license_file: LICENSE.txt
  license_family: BSD
  summary: Python bindings for NVIDIA NCCL
  description: |
    NCCL4Py provides Pythonic access to NCCL for efficient multi-GPU and
    multi-node collective communication and point-to-point transfers. It
    ships low-level Cython bindings plus a high-level `nccl.core` API.
  doc_url: https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/index.html
  dev_url: https://github.com/NVIDIA/nccl

extra:
  recipe-maintainers:
    - conda-forge/cuda
